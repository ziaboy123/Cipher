{% extends "base.html" %}
{% block title %}CIPHER{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/home.css') }}">
{% endblock %}

{% block body %}
<div class="home-shell">
  <div class="home-card">

    <div class="home-brand">
      <span class="home-wordmark">CIPHER</span>
      <p class="home-tagline">private by design.</p>
      {% if prefill_invited %}
        <div class="home-invited">channel invite received</div>
      {% endif %}
    </div>

    <div>
      <form class="home-form" method="POST" action="{{ url_for('home.create') }}" id="form-create" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="field-label" for="name">Your name</label>
          <input
            class="input"
            type="text"
            id="name"
            name="name"
            value="{{ prefill_name or '' }}"
            placeholder="e.g. Alex"
            autocomplete="off"
            autocapitalize="words"
            maxlength="30"
            autofocus
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create a room</button>
      </form>

      <div class="home-or">
        <div class="home-or-line"></div>
        <span class="home-or-text">or</span>
        <div class="home-or-line"></div>
      </div>

      <form class="home-form" method="POST" action="{{ url_for('home.join') }}" id="form-join" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="name" id="join-name-mirror">

        <div class="join-row">
          <input
            class="input input-mono"
            type="text"
            name="code"
            id="code"
            value="{{ prefill_code or '' }}"
            placeholder="room code"
            autocomplete="off"
            maxlength="8"
            spellcheck="false"
          >
          <button type="submit" class="btn btn-ghost">Join</button>
        </div>
      </form>

      {% if error %}
        <p class="error-line">{{ error }}</p>
      {% endif %}
    </div>

  </div>
</div>

<script>
  // Mirror the shared name field into the join form on submit
  const nameInput = document.getElementById('name');
  const joinMirror = document.getElementById('join-name-mirror');
  const formJoin = document.getElementById('form-join');
  const formCreate = document.getElementById('form-create');

  formJoin.addEventListener('submit', () => {
    joinMirror.value = nameInput.value;
  });

  // Clear error on any keystroke
  nameInput.addEventListener('input', clearError);
  document.getElementById('code').addEventListener('input', clearError);
  function clearError() {
    const e = document.querySelector('.error-line');
    if (e) e.remove();
  }

  // Force uppercase on code input
  const codeInput = document.getElementById('code');
  codeInput.addEventListener('input', () => {
    const pos = codeInput.selectionStart;
    codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    codeInput.setSelectionRange(pos, pos);
  });
</script>
{% endblock %}
